<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>entropy – Counter</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 4rem auto; }
    button { padding: .4rem 1rem; font-size: 1rem; cursor: pointer; margin: 0 .25rem; }
    .count { font-size: 3rem; font-weight: bold; display: block; margin: 1rem 0; }
    .negative { color: #e11d48; }
  </style>
</head>
<body>
  <h1>Counter</h1>

  <span class="count" en-mark="count">0</span>

  <template en-if="isNegative">
    <p class="negative">Value is negative!</p>
  </template>

  <br /><br />
  <button onclick="data.count--">−</button>
  <button onclick="data.count = 0">Reset</button>
  <button onclick="data.count++">+</button>

  <!--
    Uses the IIFE build – works from file:// with no dev server needed.
    Run `npm run build` once to generate dist/index.global.js.
    window.Entropy.default is the singleton instance.
  -->
  <script src="../dist/index.global.js"></script>
  <script>
    const en = Entropy.default;

    window.data = en.init();
    data.count      = 0;
    data.isNegative = en.computed(() => data.count < 0);

    en.watch('count', val => console.log('[watch] count =', val));
  </script>
</body>
</html>
